<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Fitness Dashboard</h1>
            <p>Simple UI for the COMP3011 Fitness API</p>
        </header>

        <section class="card">
            <h2>Add Workout</h2>
            <form id="workout-form">
                <input
                    id="type"
                    type="text"
                    placeholder="Workout type (Push / Legs / Run)"
                    required
                >

                <input
                    id="duration"
                    type="number"
                    placeholder="Duration (minutes)"
                    min="1"
                    required
                >

                <input
                    id="date"
                    type="date"
                    required
                >

                <textarea
                    id="notes"
                    placeholder="Notes"
                    rows="3"
                ></textarea>

                <button type="submit">Add Workout</button>
            </form>

            <p id="message"></p>
        </section>

        <section class="card">
            <h2>Analytics</h2>
            <div class="analytics">
                <div class="stat-box">
                    <h3>Current Streak</h3>
                    <p id="current">0</p>
                </div>

                <div class="stat-box">
                    <h3>Longest Streak</h3>
                    <p id="longest">0</p>
                </div>

                <div class="stat-box">
                    <h3>Total Workout Days</h3>
                    <p id="days">0</p>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Workout History</h2>
            <button type="button" onclick="loadWorkouts()">Refresh</button>
            <div id="workouts"></div>
        </section>

        <section class="card">
            <h2>Weekly Summary</h2>
            <div id="weekly"></div>
        </section>

        <section class="card">
            <h2>Exercise Explorer</h2>

            <div class="filters">
                <input
                    id="exercise-q"
                    type="text"
                    placeholder="Search exercise (e.g. plank, bench press)"
                >

                <input
                    id="exercise-body-part"
                    type="text"
                    placeholder="Body part (e.g. Chest)"
                >

                <input
                    id="exercise-equipment"
                    type="text"
                    placeholder="Equipment (e.g. Dumbbell)"
                >

                <input
                    id="exercise-difficulty"
                    type="text"
                    placeholder="Difficulty (e.g. Beginner)"
                >

                <input
                    id="exercise-type"
                    type="text"
                    placeholder="Exercise type (e.g. Strength)"
                >

                <button type="button" onclick="loadExercises()">Search Exercises</button>
            </div>

            <div id="exercises-results"></div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
